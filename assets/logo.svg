<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="240" height="240">
  <defs>
    <linearGradient id="sun" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffd24a"/>
      <stop offset="55%" stop-color="#f6a12e"/>
      <stop offset="100%" stop-color="#e8611f"/>
    </linearGradient>
    <linearGradient id="wtr" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4fc3d9"/>
      <stop offset="100%" stop-color="#0d3550"/>
    </linearGradient>
    <linearGradient id="shield" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#123a56"/>
      <stop offset="100%" stop-color="#081f30"/>
    </linearGradient>
  </defs>
  <!-- outer circle -->
  <circle cx="120" cy="120" r="116" fill="#07202f"/>
  <!-- sunset -->
  <circle cx="120" cy="104" r="60" fill="url(#sun)"/>
  <!-- silhouette skyline hint -->
  <g fill="#0a2436" opacity="0.9">
    <rect x="60" y="96" width="10" height="40"/>
    <path d="M74 100 h14 v36 h-14 z"/>
    <circle cx="150" cy="86" r="9"/>
    <rect x="146" y="86" width="8" height="50"/>
    <rect x="170" y="70" width="6" height="66"/>
    <path d="M168 92 l5 -8 l5 8 z"/>
  </g>
  <!-- shield -->
  <path d="M28 128 h184 v34 l-92 58 l-92 -58 z" fill="url(#shield)" stroke="#2f7fb0" stroke-width="3"/>
  <!-- water waves -->
  <path d="M40 150 q40 -16 80 0 t80 0" fill="none" stroke="url(#wtr)" stroke-width="9" stroke-linecap="round"/>
  <path d="M52 168 q34 -12 68 0 t68 0" fill="none" stroke="#4fc3d9" stroke-width="5" stroke-linecap="round" opacity="0.8"/>
  <!-- paddle -->
  <g stroke="#dfeaf0" stroke-width="6" stroke-linecap="round">
    <line x1="86" y1="150" x2="164" y2="118"/>
  </g>
  <ellipse cx="168" cy="115" rx="10" ry="15" fill="#c9d8e0" transform="rotate(24 168 115)"/>
  <ellipse cx="82" cy="153" rx="10" ry="15" fill="#c9d8e0" transform="rotate(24 82 153)"/>
  <!-- kayaker torso -->
  <circle cx="120" cy="132" r="12" fill="#e8611f"/>
  <rect x="108" y="140" width="24" height="16" rx="6" fill="#c94a1e"/>
  <!-- club initials -->
  <text x="120" y="205" text-anchor="middle" font-family="Manrope, Arial, sans-serif" font-weight="800" font-size="26" fill="#eef6fa" letter-spacing="2">ВКБ</text>
</svg>
